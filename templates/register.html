<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Campity</title>
    <link href="{{ url_for('static', filename='css/glossy.css') }}" rel="stylesheet">
</head>

<body style="display: flex; align-items: center; justify-content: center;">

    <div class="glass-card animate-float" style="width: 100%; max-width: 400px; padding: 40px;">
        <div style="text-align: center; margin-bottom: 30px;">
            <h1 style="font-size: 2.5rem;">Join Us</h1>
            <p style="opacity: 0.7;">Create your student account</p>
        </div>

        <form method="POST">
            <label style="font-weight: 600; font-size: 0.9rem; margin-left: 5px;">Username</label>
            <input type="text" name="username" placeholder="Choose a unique ID" required>

            <label style="font-weight: 600; font-size: 0.9rem; margin-left: 5px;">Password</label>
            <input type="password" name="password" placeholder="Strong password" required>

            <label style="font-weight: 600; font-size: 0.9rem; margin-left: 5px;">Confirm Password</label>
            <input type="password" name="confirm_password" placeholder="Repeat password" required>

            <button type="submit" class="btn-glossy" style="width: 100%; justify-content: center; margin-top: 10px;">
                Create Account
            </button>
        </form>

        <div style="text-align: center; margin-top: 30px;">
            <span style="opacity: 0.7;">Already a member?</span> <a href="{{ url_for('login') }}"
                style="color: var(--primary); text-decoration: none; font-weight: 600;">Log In</a>
        </div>
    </div>

</body>

</html>
