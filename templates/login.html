<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Campity</title>
    <link href="{{ url_for('static', filename='css/glossy.css') }}" rel="stylesheet">
</head>

<body style="display: flex; align-items: center; justify-content: center;">

    <div class="glass-card animate-float" style="width: 100%; max-width: 400px; padding: 40px;">
        <div style="text-center: center; margin-bottom: 30px;">
            <h1 style="text-align: center; font-size: 3rem;">Campity</h1>
            <p style="text-align: center; opacity: 0.7; font-size: 1.1rem;">Campus Operations Platform</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div
            style="background: rgba(255,255,255,0.5); border: 1px solid rgba(255,0,0,0.3); color: #c0392b; padding: 10px; border-radius: 8px; margin-bottom: 20px; text-align: center;">
            {{ message }}
        </div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST">
            <label style="font-weight: 600; font-size: 0.9rem; margin-left: 5px;">Student ID</label>
            <input type="text" name="username" placeholder="e.g. john.doe" required>

            <label style="font-weight: 600; font-size: 0.9rem; margin-left: 5px;">Password</label>
            <input type="password" name="password" placeholder="••••••••" required>

            <button type="submit" class="btn-glossy" style="width: 100%; justify-content: center; margin-top: 10px;">
                Access Dashboard
            </button>
        </form>

        <div style="text-align: center; margin-top: 30px;">
            <a href="{{ url_for('register') }}"
                style="color: var(--primary); text-decoration: none; font-weight: 500;">Create new account</a>
        </div>
    </div>

</body>

</html>
