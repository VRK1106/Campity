<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post a New Task</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #e0e7ff, #c3dafe);
            color: #4b5563;
        }
        .card {
            background-color: #f0f4ff;
            border: 1px solid #d1d5db;
        }
        .btn {
            background-color: #6366f1;
            color: white;
            font-weight: 600;
            padding: 12px 20px;
            border-radius: 0.5rem;
            transition: background-color 0.2s ease-in-out;
        }
        .btn:hover {
            background-color: #4f46e5;
        }
        .form-input {
            width: 100%;
            padding: 12px;
            border-radius: 0.5rem;
            border: 1px solid #d1d5db;
            transition: border-color 0.2s ease-in-out;
        }
        .form-input:focus {
            outline: none;
            border-color: #6366f1;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="card rounded-3xl shadow-2xl p-8 max-w-xl w-full mx-auto">
        <h1 class="text-3xl font-bold text-gray-800 text-center mb-6">Post a New Task</h1>
        <form action="{{ url_for('post_task', username=username) }}" method="POST" enctype="multipart/form-data" id="post-task-form">
            <div class="space-y-4">
                <div>
                    <label for="task_name" class="block text-gray-700 font-semibold mb-1">Task Name</label>
                    <input type="text" name="task_name" id="task_name" class="form-input" required>
                </div>
                <div>
                    <label for="task_description" class="block text-gray-700 font-semibold mb-1">Task Description</label>
                    <textarea name="task_description" id="task_description" rows="4" class="form-input" required></textarea>
                </div>

                <!-- Category Dropdown -->
                <div>
                    <label for="category" class="block text-gray-700 font-semibold mb-1">Task Category</label>
                    <select name="category" id="category" class="form-input" required>
                        <option value="general">General</option>
                        <option value="medical">Medical</option>
                        <option value="academic">Academic</option>
                    </select>
                </div>

                <!-- Reward Type Dropdown -->
                <div>
                    <label for="reward_type" class="block text-gray-700 font-semibold mb-1">Reward Type</label>
                    <select name="reward_type" id="reward_type" class="form-input" required>
                        <option value="cash">Cash</option>
                        <option value="favor">Favor</option>
                    </select>
                </div>

                <!-- Conditional Reward Inputs -->
                <div id="cash_reward_div">
                    <label for="reward_amount" class="block text-gray-700 font-semibold mb-1">Reward Amount</label>
                    <input type="number" name="reward_amount" id="reward_amount" class="form-input" step="0.01">
                </div>

                <div id="favor_reward_div" style="display:none;">
                    <label for="reward_favor" class="block text-gray-700 font-semibold mb-1">Describe the Favor</label>
                    <input type="text" name="reward_favor" id="reward_favor" class="form-input">
                </div>

                <div>
                    <label for="deadline_time" class="block text-gray-700 font-semibold mb-1">Deadline Time</label>
                    <input type="time" name="deadline_time" id="deadline_time" class="form-input" required>
                    <!-- Hidden input to send the combined date and time -->
                    <input type="hidden" name="deadline_date" id="deadline_date">
                    <input type="hidden" name="deadline" id="deadline">
                </div>
                <div>
                    <label for="task_file" class="block text-gray-700 font-semibold mb-1">Attach File (Optional)</label>
                    <input type="file" name="task_file" id="task_file" class="form-input">
                </div>
            </div>
            <button type="submit" class="mt-6 w-full btn">Post Task</button>
        </form>

        <a href="{{ url_for('dashboard', username=username) }}" class="block mt-4 text-center text-indigo-600 font-bold hover:underline">
            Go back to Dashboard
        </a>
    </div>

    <script>
        // JS for conditional reward inputs
        const rewardTypeSelect = document.getElementById('reward_type');
        const cashRewardDiv = document.getElementById('cash_reward_div');
        const favorRewardDiv = document.getElementById('favor_reward_div');
        const postTaskForm = document.getElementById('post-task-form');

        // Function to toggle display and required status
        function toggleRewardInputs(rewardType) {
            if (rewardType === 'cash') {
                cashRewardDiv.style.display = 'block';
                favorRewardDiv.style.display = 'none';
                document.getElementById('reward_amount').required = true;
                document.getElementById('reward_favor').required = false;
            } else {
                cashRewardDiv.style.display = 'none';
                favorRewardDiv.style.display = 'block';
                document.getElementById('reward_amount').required = false;
                document.getElementById('reward_favor').required = true;
            }
        }

        rewardTypeSelect.addEventListener('change', (event) => {
            toggleRewardInputs(event.target.value);
        });

        // Initialize display and required status on load
        document.addEventListener('DOMContentLoaded', () => {
            toggleRewardInputs(rewardTypeSelect.value);

            // JS for setting the current time and date on deadline inputs
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');

            // Set the current date in the hidden input for combined submission
            document.getElementById('deadline_date').value = `${year}-${month}-${day}`;
            
            // Set the current time as default
            document.getElementById('deadline_time').value = `${hours}:${minutes}`;
        });
        
        // JS to combine date and time before form submission
        postTaskForm.addEventListener('submit', function() {
            const deadlineDate = document.getElementById('deadline_date').value;
            const deadlineTime = document.getElementById('deadline_time').value;
            document.getElementById('deadline').value = deadlineDate + ' ' + deadlineTime; // Combine date and time
        });
    </script>
</body>
</html>
